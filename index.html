<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>StudyBuddy Chatbot</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* Achtergrond */
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Donkere overlay + blur */
        .overlay {
            backdrop-filter: blur(6px);
            width: 100%;
            height: 100vh;
            padding-top: 40px;
            display: flex;
            justify-content: center;
        }

        /* Logo helemaal linksboven */
        .logo {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 300px;
            height: auto;
            z-index: 9999;
        }

        .container {
            width: 480px;
            background: rgba(0,0,0,0.55);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .chat-box {
            height: 450px;
            overflow-y: auto;
            border: 1px solid #444;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }

        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.4;
        }

        .user {
            background: #0078ff;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }

        .bot {
            background: #e6e6e6;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }

        .typing {
            font-style: italic;
            color: #8a8a8a;
        }

        .input-area {
            display: flex;
            margin-top: 15px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 20px;
            margin-left: 10px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #005fcc;
        }
    </style>
</head>

<body>

<!-- Logo linksboven -->
<img src="studybuddylogo.png" class="logo" alt="StudyBuddy Logo">

<div class="overlay">
    <div class="container">

        <h1>StudyBuddy: Your Buddy for your ICT Q's</h1>

        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">
            <input id="user-input" type="text" placeholder="Stel je vraag..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Verstuur</button>
        </div>
    </div>
</div>

<script>
function addMessage(text, sender) {
    const chatBox = document.getElementById("chat-box");

    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function addTyping() {
    const chatBox = document.getElementById("chat-box");

    const typing = document.createElement("div");
    typing.id = "typing";
    typing.classList.add("message", "bot", "typing");
    typing.innerText = "StudyBuddy is aan het typen...";

    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
    const typing = document.getElementById("typing");
    if (typing) typing.remove();
}

async function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    addTyping();

    const response = await fetch("http://localhost:8000/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: message})
    });

    const data = await response.json();

    removeTyping();
    addMessage(data.answer, "bot");
}
</script>

</body>
</html>
